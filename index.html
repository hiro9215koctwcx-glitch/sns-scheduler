<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS投稿スケジュール管理シート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f5;
      --bg-card: #fffcf8;
      --beige: #ebe3d7;
      --beige-deep: #ddd2c2;
      --green: #6d7f6a;
      --green-soft: #e2e8df;
      --green-muted: #8a9a86;
      --terracotta: #c17a5c;
      --terracotta-deep: #a86447;
      --terracotta-soft: #f0e0d8;
      --text: #3d3830;
      --text-muted: #6b6560;
      --border: #e0d8ce;
      --radius: 18px;
      --radius-sm: 12px;
      --radius-pill: 999px;
      --shadow: 0 4px 24px rgba(61, 56, 48, 0.08);
      --shadow-hover: 0 8px 32px rgba(61, 56, 48, 0.12);
      --sns-x: #4a4540;
      --sns-ig: #b87a8c;
      --sns-line: #6d9b7a;
      --sns-other: #8f877c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      letter-spacing: 0.02em;
    }

    .app-header {
      background: linear-gradient(160deg, var(--green-soft) 0%, var(--beige) 45%, var(--terracotta-soft) 100%);
      color: var(--text);
      padding: 1.5rem 1.25rem 1.75rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .app-header h1 {
      margin: 0;
      font-size: clamp(1.2rem, 4.2vw, 1.55rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--green);
    }

    .app-header p {
      margin: 0.45rem 0 0;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.15rem 1rem 2.75rem;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.7rem;
      margin-bottom: 1.1rem;
    }

    @media (min-width: 480px) {
      .summary {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .summary-card {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 0.8rem 0.75rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .summary-card .k {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .summary-card .v {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--green);
      margin-top: 0.2rem;
    }

    .summary-card.accent .v {
      color: var(--terracotta-deep);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: flex-end;
      margin-bottom: 1.15rem;
    }

    .toolbar .field {
      flex: 1;
      min-width: 170px;
      margin: 0;
    }

    .section-title {
      margin: 0 0 0.7rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--terracotta-deep);
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--terracotta);
      opacity: 0.85;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.15rem 1.15rem 1.25rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 1.1rem;
    }

    .card:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
    }

    input[type="text"],
    input[type="date"],
    input[type="month"],
    select,
    textarea {
      width: 100%;
      padding: 0.7rem 0.95rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: "Noto Sans JP", sans-serif;
      font-weight: 500;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--green-muted);
      box-shadow: 0 0 0 3px var(--green-soft);
    }

    .field {
      margin-bottom: 0.95rem;
    }

    .field:last-of-type {
      margin-bottom: 0;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-top: 0.95rem;
      padding: 0.75rem 0.9rem;
      background: var(--beige);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .check-row input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: var(--green);
      border-radius: 4px;
    }

    .check-row label {
      margin: 0;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      flex: 1;
    }

    button {
      cursor: pointer;
      font-family: "Noto Sans JP", sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      border: none;
      border-radius: var(--radius-pill);
      padding: 0.72rem 1.35rem;
      transition: transform 0.12s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(145deg, var(--terracotta) 0%, var(--terracotta-deep) 100%);
      color: #fff;
      width: 100%;
      margin-top: 1.05rem;
      box-shadow: 0 4px 16px rgba(193, 122, 92, 0.35);
    }

    .btn-primary:hover {
      opacity: 0.96;
      box-shadow: 0 6px 22px rgba(193, 122, 92, 0.4);
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--green);
      border: 2px solid var(--green-soft);
      box-shadow: var(--shadow);
    }

    .btn-secondary:hover {
      background: var(--green-soft);
      border-color: var(--green-muted);
    }

    .btn-danger {
      background: linear-gradient(145deg, #c45c5c 0%, #a84848 100%);
      color: #fff;
      padding: 0.48rem 0.85rem;
      font-size: 0.78rem;
      border-radius: var(--radius-pill);
      box-shadow: 0 2px 10px rgba(196, 92, 92, 0.25);
    }

    .btn-ghost {
      background: transparent;
      color: var(--terracotta-deep);
      border: 2px solid var(--terracotta);
      padding: 0.48rem 0.85rem;
      font-size: 0.78rem;
      border-radius: var(--radius-pill);
    }

    .btn-ghost:hover {
      background: var(--terracotta-soft);
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 1.35rem;
    }

    .post-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .post-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.1rem 1.15rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-left: 5px solid var(--sns-accent, var(--green-muted));
      transition: box-shadow 0.25s ease;
    }

    .post-card:hover {
      box-shadow: var(--shadow-hover);
    }

    .post-card[data-platform="X"] { --sns-accent: var(--sns-x); }
    .post-card[data-platform="Instagram"] { --sns-accent: var(--sns-ig); }
    .post-card[data-platform="LINE"] { --sns-accent: var(--sns-line); }
    .post-card[data-platform="その他"] { --sns-accent: var(--sns-other); }

    .post-card.done {
      background: linear-gradient(180deg, #fffcf8 0%, #f5f2ed 100%);
      opacity: 0.95;
    }

    .post-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.55rem;
      margin-bottom: 0.55rem;
    }

    .post-date {
      font-weight: 700;
      font-size: 1.08rem;
      color: var(--green);
      letter-spacing: 0.02em;
    }

    .badge {
      display: inline-block;
      margin-top: 0.35rem;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.28rem 0.55rem;
      border-radius: var(--radius-pill);
      background: var(--beige);
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .post-card[data-platform="X"] .badge {
      background: #ebe8e4;
      color: var(--sns-x);
    }

    .post-card[data-platform="Instagram"] .badge {
      background: #f3e4e9;
      color: #8f4d62;
    }

    .post-card[data-platform="LINE"] .badge {
      background: #e4ede6;
      color: #3d6b4a;
    }

    .post-card[data-platform="その他"] .badge {
      background: var(--beige);
      color: var(--sns-other);
    }

    .status-pill {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.28rem 0.65rem;
      border-radius: var(--radius-pill);
      letter-spacing: 0.04em;
    }

    .status-pill.pending {
      background: #fff6e8;
      color: #b8732d;
      border: 1px solid #f0dcc4;
    }

    .status-pill.posted {
      background: var(--green-soft);
      color: var(--green);
      border: 1px solid #cdd8c8;
    }

    .post-memo {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0.4rem 0 0.65rem;
      line-height: 1.65;
    }

    .post-memo:empty::before {
      content: "（メモなし）";
      color: #b5aea5;
      font-style: italic;
      font-weight: 400;
    }

    .post-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      padding-top: 0.6rem;
      border-top: 1px dashed var(--border);
    }

    .post-actions label.inline-done {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin: 0;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }

    .post-actions input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: var(--green);
    }

    .empty-state {
      text-align: center;
      padding: 2.25rem 1.1rem;
      color: var(--text-muted);
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 2px dashed var(--beige-deep);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.75;
    }

    .hint {
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 0.55rem;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>SNS投稿スケジュール管理シート</h1>
    <p>飲食店・個人事業主向け｜予定をカレンダー感覚で整理</p>
  </header>

  <div class="container">
    <section class="summary" id="summary" aria-label="集計"></section>

    <div class="toolbar">
      <div class="field">
        <label for="monthFilter">表示する月</label>
        <input type="month" id="monthFilter" autocomplete="off">
      </div>
      <button type="button" class="btn-secondary" id="showAllMonths">すべての月を表示</button>
    </div>

    <div class="layout">
      <section aria-labelledby="form-heading">
        <h2 id="form-heading" class="section-title">予定の追加・編集</h2>
        <div class="card">
          <form id="postForm">
            <input type="hidden" id="editId" value="">
            <div class="field">
              <label for="postDate">投稿日</label>
              <input type="date" id="postDate" required autocomplete="off">
            </div>
            <div class="field">
              <label for="platform">SNSの種類</label>
              <select id="platform" required>
                <option value="X">X（旧Twitter）</option>
                <option value="Instagram">Instagram</option>
                <option value="LINE">LINE</option>
                <option value="その他">その他</option>
              </select>
            </div>
            <div class="field">
              <label for="memo">投稿内容メモ</label>
              <textarea id="memo" placeholder="メニュー紹介、キャンペーン、ハッシュタグ案…" autocomplete="off"></textarea>
            </div>
            <div class="check-row">
              <input type="checkbox" id="posted">
              <label for="posted">すでに投稿済み</label>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">追加する</button>
            <p class="hint" id="formHint">一覧は日付の早い順に並びます。データはこのブラウザに保存されます。</p>
          </form>
        </div>
      </section>

      <section aria-labelledby="list-heading">
        <h2 id="list-heading" class="section-title">投稿予定一覧</h2>
        <div id="postList" class="post-list"></div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = "sns-scheduler-posts-v1";

      function todayISODate() {
        var d = new Date();
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, "0");
        var day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function currentMonthValue() {
        var d = new Date();
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
      }

      function loadPosts() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          var parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function savePosts(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      }

      function sortByDate(posts) {
        return posts.slice().sort(function (a, b) {
          if (a.date !== b.date) return a.date < b.date ? -1 : 1;
          return (a.id || "").localeCompare(b.id || "");
        });
      }

      function monthFromDate(isoDate) {
        return isoDate.slice(0, 7);
      }

      var monthFilterEl = document.getElementById("monthFilter");
      var showAllBtn = document.getElementById("showAllMonths");
      var filterAllMonths = false;

      function getFilteredPosts(posts) {
        if (filterAllMonths) return sortByDate(posts);
        var ym = monthFilterEl.value;
        if (!ym) return sortByDate(posts);
        return sortByDate(posts.filter(function (p) {
          return monthFromDate(p.date) === ym;
        }));
      }

      function formatYearMonth(ym) {
        var m = ym.match(/^(\d{4})-(\d{2})$/);
        if (!m) return ym;
        return m[1] + "年" + parseInt(m[2], 10) + "月";
      }

      function renderSummary(posts) {
        var el = document.getElementById("summary");
        var ym = monthFilterEl.value || currentMonthValue();
        var labelRange;
        var total;
        var pending;
        var done;

        if (filterAllMonths) {
          labelRange = "全期間";
          total = posts.length;
          pending = posts.filter(function (p) { return !p.posted; }).length;
          done = total - pending;
        } else {
          labelRange = formatYearMonth(ym);
          var inMonth = posts.filter(function (p) { return monthFromDate(p.date) === ym; });
          total = inMonth.length;
          pending = inMonth.filter(function (p) { return !p.posted; }).length;
          done = total - pending;
        }

        el.innerHTML =
          '<div class="summary-card"><div class="k">表示</div><div class="v">' + labelRange + '</div></div>' +
          '<div class="summary-card"><div class="k">予定件数</div><div class="v">' + total + '</div></div>' +
          '<div class="summary-card accent"><div class="k">未投稿</div><div class="v">' + pending + '</div></div>' +
          '<div class="summary-card"><div class="k">投稿済</div><div class="v">' + done + '</div></div>';
      }

      function formatDisplayDate(iso) {
        var parts = iso.split("-");
        if (parts.length !== 3) return iso;
        return parts[0] + "年" + String(parseInt(parts[1], 10)) + "月" + String(parseInt(parts[2], 10)) + "日";
      }

      function renderList(posts) {
        var container = document.getElementById("postList");
        var filtered = getFilteredPosts(posts);

        if (filtered.length === 0) {
          container.innerHTML =
            '<div class="empty-state">該当する投稿予定がありません。<br>フォームから追加するか、別の月を選んでください。</div>';
          return;
        }

        container.innerHTML = filtered.map(function (p) {
          var doneClass = p.posted ? " done" : "";
          var pill = p.posted
            ? '<span class="status-pill posted">投稿済み</span>'
            : '<span class="status-pill pending">未投稿</span>';
          var memoEsc = escapeHtml(p.memo || "");
          return (
            '<article class="post-card' + doneClass + '" data-platform="' + escapeAttr(p.platform) + '" data-id="' + escapeAttr(p.id) + '">' +
            '<div class="post-head">' +
            '<div><div class="post-date">' + formatDisplayDate(p.date) + '</div>' +
            '<span class="badge">' + escapeHtml(platformLabel(p.platform)) + '</span></div>' +
            '<div>' + pill + '</div></div>' +
            '<div class="post-memo">' + memoEsc + '</div>' +
            '<div class="post-actions">' +
            '<label class="inline-done"><input type="checkbox" class="toggle-posted" ' + (p.posted ? "checked" : "") + '> 投稿済み</label>' +
            '<button type="button" class="btn-ghost btn-edit">編集</button>' +
            '<button type="button" class="btn-danger btn-delete">削除</button>' +
            '</div></article>'
          );
        }).join("");

        container.querySelectorAll(".post-card").forEach(function (card) {
          var id = card.getAttribute("data-id");
          card.querySelector(".toggle-posted").addEventListener("change", function () {
            togglePosted(id, this.checked);
          });
          card.querySelector(".btn-edit").addEventListener("click", function () {
            startEdit(id);
          });
          card.querySelector(".btn-delete").addEventListener("click", function () {
            if (confirm("この予定を削除しますか？")) removePost(id);
          });
        });
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, "&#39;");
      }

      function platformLabel(p) {
        if (p === "X") return "X";
        return p;
      }

      function refresh() {
        var posts = loadPosts();
        renderSummary(posts);
        renderList(posts);
      }

      function togglePosted(id, posted) {
        var posts = loadPosts();
        var i = posts.findIndex(function (p) { return p.id === id; });
        if (i === -1) return;
        posts[i].posted = posted;
        savePosts(posts);
        refresh();
      }

      function removePost(id) {
        var posts = loadPosts().filter(function (p) { return p.id !== id; });
        savePosts(posts);
        resetForm();
        refresh();
      }

      function startEdit(id) {
        var posts = loadPosts();
        var p = posts.find(function (x) { return x.id === id; });
        if (!p) return;
        document.getElementById("editId").value = p.id;
        document.getElementById("postDate").value = p.date;
        document.getElementById("platform").value = p.platform;
        document.getElementById("memo").value = p.memo || "";
        document.getElementById("posted").checked = !!p.posted;
        document.getElementById("submitBtn").textContent = "更新する";
        document.getElementById("formHint").textContent = "内容を修正して「更新する」を押してください。";
        var cancel = document.getElementById("cancelEdit");
        if (!cancel) {
          cancel = document.createElement("button");
          cancel.type = "button";
          cancel.id = "cancelEdit";
          cancel.className = "btn-secondary";
          cancel.style.marginTop = "0.55rem";
          cancel.style.width = "100%";
          cancel.textContent = "編集をキャンセル";
          cancel.addEventListener("click", resetForm);
          document.getElementById("postForm").appendChild(cancel);
        }
        document.getElementById("postDate").focus();
      }

      function resetForm() {
        document.getElementById("editId").value = "";
        document.getElementById("postForm").reset();
        document.getElementById("postDate").value = todayISODate();
        document.getElementById("submitBtn").textContent = "追加する";
        document.getElementById("formHint").textContent =
          "一覧は日付の早い順に並びます。データはこのブラウザに保存されます。";
        var cancel = document.getElementById("cancelEdit");
        if (cancel) cancel.remove();
      }

      document.getElementById("postForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var editId = document.getElementById("editId").value;
        var date = document.getElementById("postDate").value;
        var platform = document.getElementById("platform").value;
        var memo = document.getElementById("memo").value.trim();
        var posted = document.getElementById("posted").checked;

        var posts = loadPosts();
        if (editId) {
          var idx = posts.findIndex(function (p) { return p.id === editId; });
          if (idx !== -1) {
            posts[idx] = {
              id: editId,
              date: date,
              platform: platform,
              memo: memo,
              posted: posted
            };
          }
        } else {
          posts.push({
            id: "p-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8),
            date: date,
            platform: platform,
            memo: memo,
            posted: posted
          });
        }
        savePosts(posts);
        resetForm();
        monthFilterEl.value = monthFromDate(date);
        filterAllMonths = false;
        refresh();
      });

      monthFilterEl.addEventListener("input", function () {
        filterAllMonths = false;
        refresh();
      });

      showAllBtn.addEventListener("click", function () {
        filterAllMonths = true;
        refresh();
      });

      monthFilterEl.value = currentMonthValue();
      resetForm();
      refresh();
    })();
  </script>
</body>
</html>
